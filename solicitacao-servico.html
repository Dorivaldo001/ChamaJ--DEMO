<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChamaJá - Solicitar Serviço</title>
    <!-- Font Awesome para os Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0A398A;
            --primary-dark: #062459;
            --secondary-orange: #FF8A00;
            --text-dark: #1E293B;
            --text-gray: #64748B;
            --bg-light: #F8FAFC;
            --border-color: #E2E8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding-bottom: 30px;
        }

        /* --- NAVEGAÇÃO SUPERIOR --- */
        .top-nav-bar {
            background-color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            color: var(--text-dark);
            font-size: 18px;
            text-decoration: none;
        }

        .top-nav-bar h2 {
            font-size: 18px;
            font-weight: 700;
        }

        /* --- PROFISSIONAL SELECIONADO BANNER --- */
        .mini-pro-card {
            background-color: white;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mini-pro-card img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .mini-pro-details h3 {
            font-size: 14px;
            font-weight: 700;
        }

        .mini-pro-details p {
            font-size: 12px;
            color: var(--text-gray);
        }

        /* --- FORMULÁRIO --- */
        .form-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Elementos de Input, Select e Textarea */
        .form-control {
            width: 100%;
            background-color: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
        }

        textarea.form-control {
            height: 100px;
            resize: none;
            line-height: 1.4;
        }

        /* Linha dupla para Data e Hora */
        .form-row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        /* Área de Upload de Fotos Estilizada */
        .photo-upload-zone {
            position: relative;
            border: 2px dashed var(--primary-blue);
            background-color: rgba(10, 57, 138, 0.04);
            border-radius: 12px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .photo-upload-zone i {
            font-size: 24px;
            color: var(--primary-blue);
        }

        .photo-upload-zone span {
            font-size: 13px;
            font-weight: 500;
            color: var(--primary-blue);
        }

        .photo-upload-zone p {
            font-size: 11px;
            color: var(--text-gray);
        }

        .photo-upload-zone input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Miniaturas das imagens selecionadas */
        .preview-thumbnails-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .thumb-preview {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border-color);
        }

        /* --- BOTÃO DE AÇÃO --- */
        .btn-submit-request {
            width: 100%;
            background-color: var(--secondary-orange);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255, 138, 0, 0.3);
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .btn-submit-request:active {
            background-color: #E27B00;
        }











        /* --- MENU INFERIOR FIXO --- */
        .bottom-nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 68px;
            background-color: white;
            border-top: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            z-index: 200;
        }

        .nav-item-tab {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
        }

        .nav-item-tab.active { color: var(--primary-blue); }
        .nav-item-tab i { font-size: 18px; }

                body {
    /* Se o teu menu tem 68px de altura, adiciona pelo menos 90px ou 100px de padding */
    padding-bottom: 100px; 
    }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <div class="top-nav-bar">
        <h2>Solicitar Serviço</h2>
    </div>

    <!-- Info Resumida do Profissional Alvo -->
    <div class="mini-pro-card">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100" alt="António">
        <div class="mini-pro-details">
            <h3>António Nzage</h3>
            <p>Prestador selecionado</p>
        </div>
    </div>

    <!-- Formulário Principal -->
    <form class="form-container" onsubmit="handleFormSubmission(event)">
        
        <!-- 1. Serviço (Tipo/Descrição) -->
        <div class="form-group">
            <label for="serviceType">O que precisa que seja feito?</label>
            <textarea id="serviceType" class="form-control" placeholder="Descreva detalhadamente o problema ou o serviço elétrico que necessita..." required></textarea>
        </div>

        <!-- 2. Endereço -->
        <div class="form-group">
            <label for="serviceAddress">Endereço do Local</label>
            <input type="text" id="serviceAddress" class="form-control" placeholder="Ex: Luanda, Talatona, Rua 4, Casa Nº 12" required>
        </div>

        <!-- 3 & 4. Data e Hora -->
        <div class="form-row-grid">
            <div class="form-group">
                <label for="serviceDate">Data Pretendida</label>
                <input type="date" id="serviceDate" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="serviceTime">Hora Pretendida</label>
                <input type="time" id="serviceTime" class="form-control" required>
            </div>
        </div>

        <!-- 5. Fotos do Problema/Local -->
        <div class="form-group">
            <label>Adicionar Fotos (Opcional)</label>
            <div class="photo-upload-zone">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>Carregar Imagens</span>
                <p>Tire fotos do local ou do padrão elétrico avariado</p>
                <input type="file" id="photoInput" accept="image/*" multiple onchange="previewImages(this)">
            </div>
            <!-- Contentor de miniaturas dinâmicas -->
            <div class="preview-thumbnails-container" id="previewContainer"></div>
        </div>

        <!-- Botão: Enviar Pedido -->
        <button type="submit" class="btn-submit-request">
            <i class="fa-solid fa-paper-plane"></i>
            Enviar Pedido
        </button>

    </form>











    <!-- Menu de Navegação Inferior Profissional -->
    <div class="bottom-nav-bar">
        <a href="home.html" class="nav-item-tab">
            <i class="fa-solid fa-chart-pie"></i>
            <span>Home</span>
        </a>
        <a href="pesquisa.html" class="nav-item-tab">
            <i class="fa-solid fa-receipt"></i>
            <span>Lista</span>
        </a>
        <a href="agenda.html" class="nav-item-tab">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Agenda</span>
        </a>
        <a href="chat.html" class="nav-item-tab">
            <i class="fa-solid fa-message"></i>
            <span>Chat</span>
        </a>
        <a href="perfil-cliente.html" class="nav-item-tab">
            <i class="fa-solid fa-user-tie"></i>
            <span>Perfil</span>
        </a>
    </div>


    <script>
        // Define a data mínima do input como a data atual para evitar retrocessos
        document.getElementById('serviceDate').min = new Date().toISOString().split('T')[0];

        // Gera miniaturas visuais instantâneas ao escolher imagens
        function previewImages(input) {
            const container = document.getElementById('previewContainer');
            container.innerHTML = ""; // Limpa visualizações anteriores

            if (input.files) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.classList.add('thumb-preview');
                        container.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            }
        }

        // Lógica de Envio
        function handleFormSubmission(event) {
            event.preventDefault();

            // Captura simples para demonstração
            const servico = document.getElementById('serviceType').value;
            const endereco = document.getElementById('serviceAddress').value;
            const data = document.getElementById('serviceDate').value;
            const hora = document.getElementById('serviceTime').value;

            alert(`Pedido enviado com sucesso!\n\nServiço: ${servico.substring(0, 30)}...\nLocal: ${endereco}\nAgendado para: ${data} às ${hora}`);
            
            // Redireciona de volta para o perfil do profissional após o envio
            window.location.href = 'perfil-profissional.html';
        }
    </script>
</body>
</html>
