<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChamaJá - Pesquisa Avançada</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary-blue: #0A398A;
            --secondary-orange: #FF8A00;
            --text-dark: #1E293B;
            --text-gray: #64748B;
            --bg-light: #F8FAFC;
            --border-color: #E2E8F0;
            --success-green: #10B981;
            --danger-red: #EF4444;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* --- ZONA FIXA SUPERIOR --- */
        .top-container {
            background: white; padding: 16px;
            border-bottom: 1px solid var(--border-color); z-index: 10;
        }

        /* Barra de pesquisa com botão integrado */
        .search-box-container {
            display: flex; gap: 8px; margin-bottom: 12px;
        }

        .search-wrapper {
            position: relative; flex: 1; display: flex; align-items: center;
        }

        .search-wrapper i {
            position: absolute; left: 14px; color: var(--text-gray); font-size: 16px;
        }

        .search-wrapper input {
            width: 100%; height: 48px; background-color: var(--bg-light);
            border: 1px solid var(--border-color); border-radius: 12px;
            padding: 0 14px 0 44px; font-size: 14px; font-weight: 500; outline: none;
        }

        .btn-search-trigger {
            height: 48px; width: 48px; background-color: var(--primary-blue);
            color: white; border: none; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 16px; cursor: pointer;
        }
        .btn-search-trigger:active { background-color: #062459; }

        /* Controlos do GPS e Botão de Foco */
        .gps-row {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }

        .gps-status {
            font-size: 12px; font-weight: 600; color: var(--text-gray);
            display: flex; align-items: center; gap: 6px;
        }
        .gps-status.hunting { color: var(--secondary-orange); }
        .gps-status.success { color: var(--success-green); }

        .btn-locate-me {
            background: white; border: 1px solid var(--border-color);
            padding: 6px 12px; border-radius: 8px; font-size: 11px;
            font-weight: 700; color: var(--primary-blue); cursor: pointer;
            display: flex; align-items: center; gap: 4px;
        }

        #map {
            width: 100%; height: 220px; border-radius: 14px;
            border: 1px solid var(--border-color);
        }

        /* --- FILTROS POR ABA (TABS) --- */
        .tabs-container {
            display: flex; gap: 8px; padding: 12px 16px 4px 16px;
            background: white; border-bottom: 1px solid var(--border-color);
        }

        .tab-item {
            flex: 1; background-color: var(--bg-light);
            border: 1px solid var(--border-color); padding: 10px 0;
            border-radius: 10px; font-size: 12px; font-weight: 700;
            color: var(--text-gray); text-align: center; cursor: pointer; transition: all 0.2s;
        }

        .tab-item.active {
            background-color: var(--primary-blue); color: white; border-color: var(--primary-blue);
        }

        /* --- CONTAINER DE RESULTADOS --- */
        .results-container {
            flex: 1; overflow-y: auto; padding: 16px; background-color: var(--bg-light);
        }

        .results-header {
            font-size: 13px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 12px; color: var(--text-gray);
        }

        .pro-list { display: flex; flex-direction: column; gap: 12px; }

        /* Estilo dos Cards */
        .pro-card {
            background: white; border: 1px solid var(--border-color);
            border-radius: 16px; padding: 14px; display: flex;
            align-items: center; justify-content: space-between; gap: 12px;
        }

        .pro-left { display: flex; align-items: center; gap: 12px; }

        .pro-avatar-wrapper { position: relative; width: 56px; height: 56px; }

        .pro-avatar-wrapper img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
        }

        .online-dot {
            position: absolute; bottom: 2px; right: 2px;
            width: 12px; height: 12px; background-color: var(--success-green);
            border: 2px solid white; border-radius: 50%;
        }

        .pro-meta h4 { font-size: 14px; font-weight: 700; color: var(--text-dark); margin-bottom: 2px; }
        .pro-meta .job { font-size: 12px; font-weight: 500; color: var(--text-gray); margin-bottom: 4px; }

        .pro-badges { display: flex; gap: 6px; align-items: center; font-size: 11px; font-weight: 600; }
        .badge-star { color: #EAB308; }
        .badge-distance { color: var(--primary-blue); background: #EFF6FF; padding: 2px 6px; border-radius: 6px; }
        .badge-price { color: var(--success-green); background: #ECFDF5; padding: 2px 6px; border-radius: 6px; }

        .btn-solicitar {
            background-color: var(--secondary-orange); color: white; border: none;
            border-radius: 10px; padding: 10px 16px; font-size: 12px;
            font-weight: 700; cursor: pointer; box-shadow: 0 2px 6px rgba(255, 138, 0, 0.2);
        }
        .btn-solicitar:active { background-color: #E07A00; }

        /* Estilos customizados para os Marcadores no Mapa */
        .client-marker-icon {
            position: relative; width: 40px; height: 40px;
        }
        .client-marker-icon .pin-dot {
            position: absolute; width: 100%; height: 100%;
            background: var(--danger-red); border: 3px solid white;
            border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.4); z-index: 1;
        }
        .client-marker-icon img {
            position: absolute; top: 4px; left: 4px; width: 32px; height: 32px;
            border-radius: 50%; object-fit: cover; z-index: 2;
        }







        /* ===== Configuração Global do Sistema ===== */

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Esconde a scrollbar */
html,
body{
    -ms-overflow-style: none;
    scrollbar-width: none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar{
    display: none;
}

/* Área segura do Android */
body{
    padding-top: max(40px, env(safe-area-inset-top));
}
    </style>
</head>
<body>

    <div class="top-container">
        <div class="search-box-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar por profissão...">
            </div>
            <button class="btn-search-trigger" onclick="executarPesquisaBotao()"><i class="fa-solid fa-arrow-right"></i></button>
        </div>

        <div class="gps-row">
            <div class="gps-status hunting" id="gpsStatus">
                <i class="fa-solid fa-location-crosshairs fa-spin"></i>
                <span id="gpsStatusText">A obter GPS...</span>
            </div>
            <button class="btn-locate-me" onclick="focarNoCliente()"><i class="fa-solid fa-crosshairs"></i> Onde estou?</button>
        </div>

        <div id="map"></div>
    </div>

    <div class="tabs-container">
        <div class="tab-item active" id="tabProximo" onclick="mudarAba('proximo')">Mais Próximo</div>
        <div class="tab-item" id="tabAvaliado" onclick="mudarAba('avaliado')">Mais Avaliado</div>
        <div class="tab-item" id="tabBarato" onclick="mudarAba('barato')">Mais Barato</div>
    </div>

    <div class="results-container">
        <div class="results-header" id="listHeaderTitle">Profissionais Disponíveis (10 encontrados)</div>
        <div class="pro-list" id="proContainer"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, clientMarker;
        let clientCoords = null;
        let markersGroup = [];
        let abaAtual = 'proximo';

        // Foto simulada do cliente logado no app
        const FOTO_PERFIL_CLIENTE = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100";

        // BASE DE DADOS FICTÍCIA EXPANDIDA (Pronta para Backend)
        // Grupo A: Os 5 Iniciais do Cronograma
        const grupoFicticiosFixos = [
            { id: 1, nome: "Enfermeiro João", profissao: "Enfermeiro", foto: "https://images.unsplash.com/photo-1537368910025-700350fe46c7?w=100", avaliacao: "4.9", preco: 15000, latOff: 0.0045, lngOff: 0.0000 },
            { id: 2, nome: "Enfermeira Maria", profissao: "Enfermeiro", foto: "https://images.unsplash.com/photo-1594824813573-246434e3b96f?w=100", avaliacao: "4.8", preco: 18000, latOff: 0.0080, lngOff: 0.0020 },
            { id: 3, nome: "Eletricista Carlos", profissao: "Eletricista", foto: "https://images.unsplash.com/photo-1540569014015-19a7be504e3a?w=100", avaliacao: "4.7", preco: 9500, latOff: -0.0090, lngOff: -0.0010 },
            { id: 4, nome: "Canalizador Pedro", profissao: "Canalizador", foto: "https://images.unsplash.com/photo-1621574539437-4b7cb63120b8?w=100", avaliacao: "4.5", preco: 7000, latOff: 0.0180, lngOff: -0.0050 },
            { id: 5, nome: "Técnica Ana", profissao: "Técnico de AC", foto: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=100", avaliacao: "4.6", preco: 12000, latOff: -0.0250, lngOff: 0.0100 }
        ];

        // Grupo B: Mais 20 adicionais dinâmicos que vão andar no mapa
        let profissionaisMoveis = [];
        const profissoesPool = ["Pedreiro", "Pintor", "Mecânico", "Jardineiro", "Estofador", "Carpinteiro", "Enfermeiro", "Eletricista"];
        const nomesPool = ["Manuel", "António", "Francisco", "José", "Mateus", "Lucas", "Marcos", "André", "Sebastião", "Paulo", "Teresa", "Cláudia", "Júlia", "Rosa", "Fátima"];

        for (let i = 1; i <= 20; i++) {
            profissionaisMoveis.push({
                id: 10 + i,
                nome: `Técnico ${nomesPool[i % nomesPool.length]} ${i}`,
                profissao: profissoesPool[i % profissoesPool.length],
                foto: `https://i.pravatar.cc/100?img=${i+10}`,
                avaliacao: (4.0 + Math.random() * 1.0).toFixed(1),
                preco: Math.round(5000 + Math.random() * 20000),
                latOff: (Math.random() - 0.5) * 0.06,
                lngOff: (Math.random() - 0.5) * 0.06,
                direcaoLat: (Math.random() - 0.5) * 0.0005,
                direcaoLng: (Math.random() - 0.5) * 0.0005
            });
        }

        // Junta tudo num array mestre controlado
        let todosProfissionais = [...grupoFicticiosFixos, ...profissionaisMoveis];

        // --- INICIALIZAÇÃO ---
        window.addEventListener('DOMContentLoaded', () => {
            map = L.map('map', { zoomControl: false }).setView([-8.8368, 13.2343], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            iniciarGeolocalizacaoTempoReal();
            iniciarSimulacaoMovimentoMapa();
        });

        function iniciarGeolocalizacaoTempoReal() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                clientCoords = { lat, lng };

                document.getElementById('gpsStatus').className = "gps-status success";
                document.getElementById('gpsStatusText').textContent = "GPS Conectado em tempo real";

                // Atualizar ou criar o Marcador Vermelho com a foto do Cliente
                if (clientMarker) {
                    clientMarker.setLatLng([lat, lng]);
                } else {
                    const clientIcon = L.divIcon({
                        html: `<div class="client-marker-icon">
                                <div class="pin-dot"></div>
                                <img src="${FOTO_PERFIL_CLIENTE}">
                               </div>`,
                        className: '', iconSize: [40, 40], iconAnchor: [20, 20]
                    });
                    clientMarker = L.marker([lat, lng], { icon: clientIcon }).addTo(map);
                    map.setView([lat, lng], 14);
                }

                atualizarProcessamentoGeral();
            }, () => {
                document.getElementById('gpsStatusText').textContent = "Falha ao ler GPS real.";
            }, { enableHighAccuracy: true });
        }

        // Simula o movimento constante de 20 profissionais no mapa a cada 2 segundos
        function iniciarSimulacaoMovimentoMapa() {
            setInterval(() => {
                profissionaisMoveis.forEach(pro => {
                    pro.latOff += pro.direcaoLat;
                    pro.lngOff += pro.direcaoLng;

                    // Mantém os profissionais dentro de um limite geográfico
                    if (Math.abs(pro.latOff) > 0.05) pro.direcaoLat *= -1;
                    if (Math.abs(pro.lngOff) > 0.05) pro.direcaoLng *= -1;
                });
                atualizarProcessamentoGeral();
            }, 2000);
        }

        function calcularHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function mudarAba(novaAba) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            if(novaAba === 'proximo') document.getElementById('tabProximo').classList.add('active');
            if(novaAba === 'avaliado') document.getElementById('tabAvaliado').classList.add('active');
            if(novaAba === 'barato') document.getElementById('tabBarato').classList.add('active');
            
            abaAtual = novaAba;
            atualizarProcessamentoGeral();
        }

        function executarPesquisaBotao() {
            atualizarProcessamentoGeral();
        }

        // Efetua os cálculos, atualiza o mapa e injeta os dados estruturados na UI
        function atualizarProcessamentoGeral() {
            if (!clientCoords) return;

            // Recalcula as distâncias e as coordenadas absolutas com base na posição real do utilizador
            todosProfissionais.forEach(pro => {
                pro.latAbs = clientCoords.lat + pro.latOff;
                pro.lngAbs = clientCoords.lng + pro.lngOff;
                pro.distancia = calcularHaversine(clientCoords.lat, clientCoords.lng, pro.latAbs, pro.lngAbs);
            });

            let listaFiltrada = [...todosProfissionais];
            const pesquisa = document.getElementById('searchInput').value.toLowerCase().trim();

            if (pesquisa !== "") {
                listaFiltrada = listaFiltrada.filter(p => p.profissao.toLowerCase().includes(pesquisa) || p.nome.toLowerCase().includes(pesquisa));
            }

            // APLICAÇÃO RÍGIDA DAS REGRAS DAS ABAS E VOLUMETRIA SOLICITADA
            let listaExibicao = [];

            if (abaAtual === 'avaliado') {
                // Regra: Mostra os 2 bem mais avaliados
                listaFiltrada.sort((a,b) => b.avaliacao - a.avaliacao);
                listaExibicao = listaFiltrada.slice(0, 2);
                document.getElementById('listHeaderTitle').textContent = `Os 2 Profissionais Mais Bem Avaliados`;
                
                // Atualizar Mapa com apenas os 2
                renderizarMarcadoresNoMapa(listaExibicao);
            } 
            else if (abaAtual === 'barato') {
                // Regra: Mostra outros 3 mais baratos
                listaFiltrada.sort((a,b) => a.preco - b.preco);
                listaExibicao = listaFiltrada.slice(0, 3);
                document.getElementById('listHeaderTitle').textContent = `Os 3 Profissionais Mais Baratos da Região`;
                
                // Atualizar Mapa com apenas os 3
                renderizarMarcadoresNoMapa(listaExibicao);
            } 
            else if (abaAtual === 'proximo') {
                // Regra: Mostra os 5 fictícios iniciais ordenados por distância, mas garante a visibilidade dos 20 móveis no mapa
                let fixosCalculados = [...grupoFicticiosFixos];
                fixosCalculados.sort((a,b) => a.distancia - b.distancia);
                listaExibicao = fixosCalculados; // Exibe 5 cards
                document.getElementById('listHeaderTitle').textContent = `Os 5 Profissionais Mais Próximos de Si`;

                // Renderiza a totalidade dos elementos (Fixos + Móveis se movendo) no mapa
                renderizarMarcadoresNoMapa(todosProfissionais);
            }

            // Renderizar na Lista Visual (Sempre limitando a cards limpos com avaliação e botão solicitar)
            const container = document.getElementById('proContainer');
            container.innerHTML = "";

            listaExibicao.forEach(pro => {
                const distTxt = pro.distancia < 1 ? `${Math.round(pro.distancia * 1000)} m` : `${pro.distancia.toFixed(1)} km`;
                const card = document.createElement('div');
                card.className = 'pro-card';
                card.innerHTML = `
                    <div class="pro-left">
                        <div class="pro-avatar-wrapper">
                            <img src="${pro.foto}" alt="${pro.nome}">
                            <div class="online-dot"></div>
                        </div>
                        <div class="pro-meta">
                            <h4>${pro.nome}</h4>
                            <div class="job">${pro.profissao}</div>
                            <div class="pro-badges">
                                <span class="badge-star"><i class="fa-solid fa-star"></i> ${pro.avaliacao}</span>
                                <span class="badge-distance"><i class="fa-solid fa-location-dot"></i> ${distTxt}</span>
                                <span class="badge-price">${pro.preco.toLocaleString()} Kz</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn-solicitar" onclick="solicitarProfissional(${pro.id})">Solicitar</button>
                `;
                container.appendChild(card);
            });
        }

        // Foca o mapa na localização em tempo real do Cliente com zoom máximo
        function focarNoCliente() {
            if (clientCoords) {
                map.setView([clientCoords.lat, clientCoords.lng], 16);
                if (clientMarker) clientMarker.openPopup();
            } else {
                alert("Aguardando coordenadas do GPS...");
            }
        }

        function renderizarMarcadoresNoMapa(lista) {
            markersGroup.forEach(m => map.removeLayer(m));
            markersGroup = [];

            lista.forEach(pro => {
                const proIcon = L.divIcon({
                    html: `<div style="background-color: var(--primary-blue); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3)">
                            <i class="fa-solid fa-user-gear" style="font-size:12px"></i>
                           </div>`,
                    className: '', iconSize: [30, 30], iconAnchor: [15, 15]
                });

                const marker = L.marker([pro.latAbs, pro.lngAbs], { icon: proIcon })
                                .addTo(map)
                                .bindPopup(`<b>${pro.nome}</b><br>${pro.profissao}`);
                markersGroup.push(marker);
            });
        }

        // Redirecionamento explícito ao solicitar profissional
        function solicitarProfissional(id) {
            window.location.href = `perfil-profissional-no-cliente.html?id=${id}`;
        }
    </script>
</body>
</html>
